receivers:
  otlp:
    protocols:
      grpc:
      http:
        cors:
          allowed_origins: ["http://localhost:5173"]

processors:
  batch:

exporters:
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true
  logging:
    loglevel: debug

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/jaeger, logging]