spring:
  application:
    name: user-service
  # Mover todo esto fuera de 'management'
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/intellicart_db}
    username: ${SPRING_DATASOURCE_USERNAME:samuel_admin}
    password: ${SPRING_DATASOURCE_PASSWORD:S1036519037.a}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer: # El productor de kafka va aquí, no en management
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

# El bloque management solo debe tener esto:
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

