server:
  port: 8080

spring:
  application:
    name: api-gateway
  main:
    web-application-type: reactive
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
      httpclient:
        connect-timeout: 5000
        response-timeout: 10s

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always # Útil para debug en dev, restringir en prod
      application: ${spring.application.name} # Etiqueta global para filtrar en Grafana
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  prometheus:
    metrics:
      export:
        enabled: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty: INFO

cloud:
  gateway:
    routes:
      - id: user-service
        uri: ${USER_SERVICE_URL:http://user-service:8081}
        predicates:
          - Path=/api/users/**, /api/auth/**
      - id: order-service
        uri: ${ORDER_SERVICE_URL:http://order-service:8082}
        predicates:
          - Path=/api/orders/**
      - id: ml-service
        uri: ${ORDER_SERVICE_URL:http://order-service:8082}
        predicates:
          - Path=/api/recommendations/**